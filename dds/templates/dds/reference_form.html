{% extends 'dds/base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1>{{ title }}</h1>
    <a class="btn btn-secondary" href="{{ cancel_url }}">Назад</a>
</div>
<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-primary" type="submit">Сохранить</button>
            <a href="{{ cancel_url }}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
