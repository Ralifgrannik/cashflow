{% extends 'dds/base.html' %}

{% block content %}
<div class="card">
    <div class="card-body">
        <h1>{{ title }}</h1>
        <p>Вы уверены, что хотите удалить объект: <strong>{{ object }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Удалить</button>
            <a href="{{ cancel_url }}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
