{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashflow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        select.form-select option[value=""] {
            color: #6c757d;
            opacity: 0.7;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'record_list' %}">Cashflow</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="{% url 'record_list' %}">Записи</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'manage_statuses' %}">Статусы</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'manage_types' %}">Типы</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'manage_categories' %}">Категории</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'manage_subcategories' %}">Подкатегории</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="container">
    {% if messages %}
        <div class="mb-3">
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
