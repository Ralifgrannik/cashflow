{% extends 'dds/base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Типы</h1>
</div>
<div class="row">
    <div class="col-lg-6">
        <div class="card mb-4">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-primary" type="submit">Добавить тип</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-lg-6">
        <div class="card">
            <div class="card-body">
                <table class="table table-sm">
                    <thead>
                        <tr><th>Название</th><th></th></tr>
                    </thead>
                    <tbody>
                        {% for type in types %}
                            <tr>
                                <td>{{ type.name }}</td>
                                <td class="text-end">
                                    <a class="btn btn-sm btn-outline-primary" href="{% url 'edit_type' type.pk %}">Изменить</a>
                                    <a class="btn btn-sm btn-outline-danger" href="{% url 'delete_type' type.pk %}">Удалить</a>
                                </td>
                            </tr>
                        {% empty %}
                            <tr><td colspan="2">Типов нет.</td></tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
